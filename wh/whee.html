
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wheel of Names</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link id="heading-font-link" href="https://fonts.googleapis.com/css2?family=Righteous:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link id="body-font-link" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['var(--font-heading-name)', 'cursive'],
              body: ['var(--font-body-name)', 'monospace'],
            },
            spacing: {
              base: 'var(--space-base)',
            },
            borderRadius: {
              small: 'var(--radius-small)',
              large: 'var(--radius-large)',
            },
            boxShadow: {
              custom: 'var(--shadow-custom)',
              'custom-hover': 'var(--shadow-custom-hover)',
            },
          }
        }
      }
    </script>
    
    <style>
      :root {
        /* Typography */
        --font-heading-name: 'Righteous';
        --font-body-name: 'Space Mono';
        --font-heading: 'Righteous', cursive;
        --font-body: 'Space Mono', monospace;
        --letter-spacing-heading: 0.75px;
        --letter-spacing-body: 0px;
        
        /* Spacing */
        --space-base: 1rem;
        
        /* Borders */
        --radius-small: 8px;
        --radius-large: 16px;
        --border-width: 3px;
        
        /* Shadows */
        --shadow-color: 20 20 20;
        --shadow-offset-x: 6px;
        --shadow-offset-y: 6px;
        --shadow-blur: 0px;
        --shadow-spread: 0px;
        --shadow-opacity: 1;
        --shadow-custom: 6px 6px 0px rgb(var(--shadow-color));
        --shadow-custom-hover: 2px 2px 0px rgb(var(--shadow-color));
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
        border-radius: var(--radius-small);
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: var(--radius-small);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
    </style>
</head>
<body class="font-body bg-neutral-50 text-neutral-900 min-h-screen flex flex-col" style="height: auto; min-height: 100%;">

    <!-- Header -->
    <header class="bg-white border-b-4 border-neutral-900 py-4 px-6 shadow-custom mb-8">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-neutral-900 rounded-full flex items-center justify-center text-white font-heading text-xl">W</div>
                <h1 class="font-heading text-2xl md:text-3xl text-neutral-900 tracking-wide">Weighted Wheel</h1>
            </div>
            <p class="hidden md:block text-neutral-500 text-sm"><u>Buy us a Coffee!</u>u></p>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 pb-12 flex flex-col lg:flex-row gap-8 lg:gap-12">
        
        <!-- Left Panel: The Wheel -->
        <section class="flex-1 flex flex-col items-center justify-center bg-white p-6 rounded-large border-4 border-neutral-900 shadow-custom max-h-[800px]">
            <h2 class="font-heading text-xl text-neutral-800 mb-6 w-full text-center">Click center to spin!</h2>
            
            <div class="relative w-full max-w-[500px] aspect-square">
                <!-- Canvas for Wheel -->
                <canvas id="wheelCanvas" width="500" height="500" class="w-full h-full rounded-full border-4 border-neutral-900 shadow-inner"></canvas>
                
                <!-- Center Spin Button -->
                <button id="spinBtn" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 md:w-24 md:h-24 bg-white border-4 border-neutral-900 rounded-full shadow-custom hover:shadow-custom-hover hover:translate-y-[4px] hover:translate-x-[4px] transition-all flex items-center justify-center z-20 cursor-pointer group">
                    <span class="font-heading text-xl md:text-2xl text-neutral-900 group-hover:scale-110 transition-transform">SPIN</span>
                </button>
                
                <!-- Pointer (Right Side) -->
                <div class="absolute top-1/2 right-[-10px] md:right-[-20px] -translate-y-1/2 z-30 drop-shadow-md">
                    <!-- CSS Triangle pointing left -->
                    <div class="w-0 h-0 border-y-[15px] border-y-transparent border-r-[30px] border-r-neutral-900"></div>
                    <div class="w-0 h-0 border-y-[10px] border-y-transparent border-r-[20px] border-r-white absolute top-[5px] left-[6px]"></div>
                </div>
            </div>
        </section>

        <!-- Right Panel: Controls & Inputs -->
        <section class="w-full lg:w-[450px] flex flex-col gap-6 max-h-[800px]">
            <!-- Names Input -->
            <div class="bg-white p-6 rounded-large border-4 border-neutral-900 shadow-custom flex flex-col">
                <div class="mb-4">
                    <h2 class="font-heading text-2xl text-neutral-900 mb-2">Entries</h2>
                    <p class="text-neutral-600 text-sm">
                        Enter names below (one per line).
                    </p>
                </div>
                
                <textarea id="entriesInput" class="w-full h-[200px] p-4 bg-neutral-50 border-2 border-neutral-300 rounded-small font-body text-neutral-800 focus:outline-none focus:border-neutral-900 focus:ring-2 focus:ring-neutral-200 resize-none transition-colors" spellcheck="false">
Alice
Bob
Charlie
Diana
Eve</textarea>
                
                <div class="mt-4 flex gap-4">
                    <button id="updateBtn" class="flex-1 bg-neutral-900 text-white font-heading py-3 px-4 rounded-small border-2 border-neutral-900 shadow-custom hover:shadow-custom-hover hover:translate-y-[4px] hover:translate-x-[4px] transition-all text-lg">
                        Update List
                    </button>
                    <button id="shuffleBtn" class="bg-white text-neutral-900 font-heading py-3 px-4 rounded-small border-2 border-neutral-900 shadow-custom hover:shadow-custom-hover hover:translate-y-[4px] hover:translate-x-[4px] transition-all text-lg" title="Shuffle Entries">
                        Shuffle
                    </button>
                </div>
            </div>
            
            <!-- Probability Editor (Collapsible) -->
            <div class="bg-neutral-100 p-5 rounded-large border-4 border-neutral-900 shadow-custom flex flex-col transition-all">
                <div id="toggleProbabilityBtn" class="flex justify-between items-center cursor-pointer group select-none">
                    <h3 class="font-heading text-xl text-neutral-900 group-hover:text-neutral-600 transition-colors">Privacy Policy</h3>
                    <div class="flex items-center gap-3">
                        <span id="probabilityLabels" class="text-xs text-neutral-500 font-body transition-opacity duration-200">Terms / Conditions</span>
                        <div id="toggleIcon" class="w-8 h-8 flex items-center justify-center bg-white border-2 border-neutral-900 rounded-small font-heading text-xl shadow-[2px_2px_0px_rgb(20,20,20)] group-hover:translate-y-[1px] group-hover:translate-x-[1px] group-hover:shadow-[1px_1px_0px_rgb(20,20,20)] transition-all">
                            -
                        </div>
                        <p>Har!</p>
                    </div>
                </div>
                
                <div id="probabilityContent" class="flex flex-col overflow-hidden transition-all duration-300 mt-4 h-auto max-h-[300px]">
                    <div id="probabilityEditor" class="flex-1 overflow-y-auto space-y-2 pr-2">
                        <!-- Editor rows populated by JS -->
                    </div>
                    <p>Hi!</p>
                </div>
                <p>Hello!</p>
            </div>
            <p>si!</p>
        </section>
        <p>Ho!</p>
    </main>

    <!-- Winner Modal Overlay -->
    <div id="winnerModal" class="fixed inset-0 bg-neutral-900/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white p-8 md:p-10 rounded-large border-4 border-neutral-900 shadow-[12px_12px_0px_rgb(20,20,20)] max-w-lg w-full text-center transform scale-90 transition-transform duration-300" id="winnerModalContent">
            <h2 class="font-heading text-3xl md:text-4xl text-neutral-900 mb-2">We have a winner!</h2>
            <p class="text-neutral-500 mb-6">The wheel has spoken.</p>
            
            <div class="py-6 px-4 bg-neutral-100 rounded-small border-2 border-neutral-200 mb-8">
                <span id="winnerText" class="font-heading text-4xl md:text-5xl text-neutral-900 break-words">Winner Name</span>
            </div>
            
            <div class="flex flex-col sm:flex-row gap-4 w-full">
                <button id="closeModalBtn" class="flex-1 bg-white text-neutral-900 font-heading py-3 px-4 rounded-small border-2 border-neutral-900 shadow-custom hover:shadow-custom-hover hover:translate-y-[4px] hover:translate-x-[4px] transition-all text-lg">
                    Keep on Wheel
                </button>
                <button id="removeWinnerBtn" class="flex-1 bg-neutral-900 text-white font-heading py-3 px-4 rounded-small border-2 border-neutral-900 shadow-custom hover:shadow-custom-hover hover:translate-y-[4px] hover:translate-x-[4px] transition-all text-lg">
                    Remove Winner
                </button>
            </div>
        </div>
    </div>

    <!-- Application Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const entriesInput = document.getElementById('entriesInput');
            const updateBtn = document.getElementById('updateBtn');
            const shuffleBtn = document.getElementById('shuffleBtn');
            const spinBtn = document.getElementById('spinBtn');
            const probabilityEditor = document.getElementById('probabilityEditor');
            const winnerModal = document.getElementById('winnerModal');
            const winnerModalContent = document.getElementById('winnerModalContent');
            const winnerText = document.getElementById('winnerText');
            const closeModalBtn = document.getElementById('closeModalBtn');
            const removeWinnerBtn = document.getElementById('removeWinnerBtn');
            
            // Collapsible Panel Elements
            const toggleProbabilityBtn = document.getElementById('toggleProbabilityBtn');
            const probabilityContent = document.getElementById('probabilityContent');
            const toggleIcon = document.getElementById('toggleIcon');
            const probabilityLabels = document.getElementById('probabilityLabels');

            // State
            let entries = [];
            let currentRotation = 0; // in radians
            let isSpinning = false;
            let isPanelOpen = true;
            let currentWinnerIndex = -1;
            
            // Vibrant color palette for the wheel
            const colors = [
                '#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', 
                '#2AB7CA', '#F0B67F', '#FE4A90', '#55DDE0', 
                '#F6E8EA', '#C18C5D', '#49DCB1', '#8E7DBE'
            ];

            // Initialize
            parseEntries();
            
            // Event Listeners
            updateBtn.addEventListener('click', parseEntries);
            shuffleBtn.addEventListener('click', shuffleEntries);
            spinBtn.addEventListener('click', spinWheel);
            closeModalBtn.addEventListener('click', closeModal);
            
            // Remove Winner Logic
            removeWinnerBtn.addEventListener('click', () => {
                if (currentWinnerIndex > -1 && currentWinnerIndex < entries.length) {
                    // Remove the winner from the entries array
                    entries.splice(currentWinnerIndex, 1);
                    
                    // Update the textarea to reflect the removed entry
                    entriesInput.value = entries.map(e => e.name).join('\n');
                    
                    // Handle case where all entries are removed
                    if (entries.length === 0) {
                        entries = [{ name: 'Add some names!', weight: 1 }];
                        entriesInput.value = '';
                    }
                    
                    // Re-render the UI and wheel
                    renderProbabilityEditor();
                    drawWheel();
                    
                    // Close the modal
                    closeModal();
                }
            });
            
            // Collapsible Panel Toggle Logic
            toggleProbabilityBtn.addEventListener('click', () => {
                isPanelOpen = !isPanelOpen;
                if (isPanelOpen) {
                    probabilityContent.style.maxHeight = '300px';
                    probabilityContent.style.marginTop = '1rem';
                    probabilityContent.style.opacity = '1';
                    toggleIcon.textContent = '-';
                    probabilityLabels.style.opacity = '1';
                } else {
                    probabilityContent.style.maxHeight = '0px';
                    probabilityContent.style.marginTop = '0px';
                    probabilityContent.style.opacity = '0';
                    toggleIcon.textContent = '+';
                    probabilityLabels.style.opacity = '0';
                }
            });
            
            // Functions
            function parseEntries() {
                if (isSpinning) return;
                
                const text = entriesInput.value;
                const lines = text.split('\n').filter(line => line.trim() !== '');
                
                // Store old entries to preserve weights
                const oldEntriesMap = new Map();
                entries.forEach(e => oldEntriesMap.set(e.name, e.weight));
                
                entries = lines.map(name => {
                    const cleanName = name.trim();
                    // Preserve old weight if it exists, otherwise default to 1
                    const weight = oldEntriesMap.has(cleanName) ? oldEntriesMap.get(cleanName) : 1;
                    return { name: cleanName, weight: weight };
                });
                
                if (entries.length === 0) {
                    entries = [{ name: 'Add some names!', weight: 1 }];
                }
                
                renderProbabilityEditor();
                drawWheel();
            }
            
            function shuffleEntries() {
                if (isSpinning) return;
                
                // Fisher-Yates shuffle
                for (let i = entries.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [entries[i], entries[j]] = [entries[j], entries[i]];
                }
                
                // Update textarea to reflect new order
                entriesInput.value = entries.map(e => e.name).join('\n');
                
                renderProbabilityEditor();
                drawWheel();
            }
            
            function renderProbabilityEditor() {
                probabilityEditor.innerHTML = '';
                const totalWeight = entries.reduce((sum, e) => sum + e.weight, 0);
                
                entries.forEach((entry, index) => {
                    const percentage = totalWeight > 0 ? ((entry.weight / totalWeight) * 100).toFixed(1) : 0;
                    
                    const row = document.createElement('div');
                    row.className = 'flex items-center justify-between gap-3 bg-white p-3 rounded-small border-2 border-neutral-200 shadow-sm transition-colors hover:border-neutral-400';
                    
                    // Name
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'font-medium text-neutral-800 truncate flex-1';
                    nameSpan.textContent = entry.name;
                    
                    // Controls Container
                    const controlsDiv = document.createElement('div');
                    controlsDiv.className = 'flex items-center gap-3';
                    
                    // Percentage Display
                    const probSpan = document.createElement('span');
                    probSpan.className = 'text-xs font-body text-neutral-500 w-12 text-right percentage-display';
                    probSpan.textContent = `${percentage}%`;
                    probSpan.dataset.index = index;
                    
                    // Weight Input
                    const weightInput = document.createElement('input');
                    weightInput.type = 'number';
                    weightInput.min = '1';
                    weightInput.value = entry.weight;
                    weightInput.className = 'w-16 p-1.5 border-2 border-neutral-300 rounded text-center font-body text-sm focus:outline-none focus:border-neutral-900 focus:ring-1 focus:ring-neutral-900';
                    
                    // Event listener for weight changes
                    weightInput.addEventListener('input', (e) => {
                        let newWeight = parseFloat(e.target.value);
                        if (isNaN(newWeight) || newWeight < 0) newWeight = 0;
                        
                        entries[index].weight = newWeight;
                        updatePercentages();
                    });
                    
                    controlsDiv.appendChild(probSpan);
                    controlsDiv.appendChild(weightInput);
                    
                    row.appendChild(nameSpan);
                    row.appendChild(controlsDiv);
                    
                    probabilityEditor.appendChild(row);
                });
            }
            
            function updatePercentages() {
                const totalWeight = entries.reduce((sum, e) => sum + e.weight, 0);
                const displays = probabilityEditor.querySelectorAll('.percentage-display');
                
                displays.forEach(display => {
                    const index = display.dataset.index;
                    const entry = entries[index];
                    const percentage = totalWeight > 0 ? ((entry.weight / totalWeight) * 100).toFixed(1) : 0;
                    display.textContent = `${percentage}%`;
                });
            }
            
            function drawWheel() {
                const width = canvas.width;
                const height = canvas.height;
                const centerX = width / 2;
                const centerY = height / 2;
                const radius = Math.min(centerX, centerY) - 10;
                
                ctx.clearRect(0, 0, width, height);
                
                if (entries.length === 0) return;
                
                // CRITICAL: Every slice gets exactly the same visual angle
                const sliceAngle = (2 * Math.PI) / entries.length;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(currentRotation);
                
                for (let i = 0; i < entries.length; i++) {
                    const startAngle = i * sliceAngle;
                    const endAngle = (i + 1) * sliceAngle;
                    
                    // Draw slice background
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, radius, startAngle, endAngle);
                    ctx.closePath();
                    
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.fill();
                    
                    // Draw slice border
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#171717';
                    ctx.stroke();
                    
                    // Draw text
                    ctx.save();
                    ctx.rotate(startAngle + sliceAngle / 2);
                    
                    ctx.textAlign = 'right';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = '#171717';
                    
                    let fontSize = entries.length > 20 ? 12 : entries.length > 10 ? 16 : 22;
                    ctx.font = `600 ${fontSize}px 'Space Mono', monospace`;
                    
                    ctx.lineWidth = 3;
                    ctx.strokeStyle = '#ffffff';
                    
                    const textX = radius - 30;
                    
                    let displayText = entries[i].name;
                    if (displayText.length > 15) {
                        displayText = displayText.substring(0, 13) + '...';
                    }
                    
                    ctx.strokeText(displayText, textX, 0);
                    ctx.fillText(displayText, textX, 0);
                    
                    ctx.restore();
                }
                
                ctx.restore();
            }
            
            function spinWheel() {
                if (isSpinning || entries.length === 0) return;
                
                const totalWeight = entries.reduce((sum, e) => sum + e.weight, 0);
                if (totalWeight <= 0) {
                    alert("Total probability weight must be greater than 0.");
                    return;
                }
                
                isSpinning = true;
                
                // 1. Determine the winner based on WEIGHTED probability
                let randomValue = Math.random() * totalWeight;
                let winnerIndex = 0;
                
                for (let i = 0; i < entries.length; i++) {
                    randomValue -= entries[i].weight;
                    if (randomValue <= 0) {
                        winnerIndex = i;
                        break;
                    }
                }
                
                // Store the winner index for potential deletion
                currentWinnerIndex = winnerIndex;
                
                // 2. Calculate angles
                const sliceAngle = (2 * Math.PI) / entries.length;
                const winnerCenterAngle = (winnerIndex * sliceAngle) + (sliceAngle / 2);
                
                const currentMod = currentRotation % (2 * Math.PI);
                const targetMod = (2 * Math.PI) - winnerCenterAngle;
                
                let diff = targetMod - currentMod;
                if (diff < 0) diff += 2 * Math.PI;
                
                const extraSpins = 8 * 2 * Math.PI;
                const targetRotation = currentRotation + diff + extraSpins;
                
                // 3. Animate
                const duration = 5000;
                const startTime = performance.now();
                const startRotation = currentRotation;
                
                function animate(currentTime) {
                    const elapsed = currentTime - startTime;
                    let progress = elapsed / duration;
                    
                    if (progress >= 1) {
                        progress = 1;
                        currentRotation = targetRotation;
                        drawWheel();
                        isSpinning = false;
                        showWinner(entries[winnerIndex].name);
                        return;
                    }
                    
                    const easeOut = 1 - Math.pow(1 - progress, 4);
                    
                    currentRotation = startRotation + (targetRotation - startRotation) * easeOut;
                    drawWheel();
                    
                    requestAnimationFrame(animate);
                }
                
                requestAnimationFrame(animate);
            }
            
            function triggerConfetti() {
                const duration = 3000;
                const end = Date.now() + duration;

                (function frame() {
                    confetti({
                        particleCount: 5,
                        angle: 60,
                        spread: 55,
                        origin: { x: 0 },
                        colors: colors
                    });
                    confetti({
                        particleCount: 5,
                        angle: 120,
                        spread: 55,
                        origin: { x: 1 },
                        colors: colors
                    });

                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());
            }
            
            function showWinner(name) {
                winnerText.textContent = name;
                winnerModal.classList.remove('hidden');
                
                setTimeout(() => {
                    winnerModal.classList.remove('opacity-0');
                    winnerModalContent.classList.remove('scale-90');
                    winnerModalContent.classList.add('scale-100');
                    
                    // Trigger confetti after modal starts animating in
                    triggerConfetti();
                }, 10);
            }
            
            function closeModal() {
                winnerModal.classList.add('opacity-0');
                winnerModalContent.classList.remove('scale-100');
                winnerModalContent.classList.add('scale-90');
                
                setTimeout(() => {
                    winnerModal.classList.add('hidden');
                }, 300);
            }
        });
    </script>
</body>
</html>
