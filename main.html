<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Weighted Wheel</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; background: #f0f2f5; margin: 0; height: 100vh; }
        /* UI Panel Styling */
        .sidebar { width: 300px; background: white; padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .entry-row { display: flex; gap: 5px; margin-bottom: 10px; align-items: center; }
        input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        .name-input { flex-grow: 2; }
        .weight-input { width: 50px; }
        button { padding: 10px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        .add-btn { background: #34a853; color: white; margin-bottom: 20px; }
        .spin-btn { background: #1a73e8; color: white; font-size: 1.2rem; margin-top: auto; }

        /* Wheel Area */
        .main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #canvas { transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); border: 10px solid #fff; border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .pointer { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-right: 30px solid #fbbc05; position: absolute; right: calc(50% - 225px); top: 50%; transform: translateY(-50%); z-index: 10; }
        #winner-display { margin-top: 20px; font-size: 1.5rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Entries</h2>
        <div id="entry-list">
            <!-- Starting Entries -->
            <div class="entry-row">
                <input type="text" class="name-input" value="Arina">
                <input type="number" class="weight-input" value="70" title="Weight">
            </div>
            <div class="entry-row">
                <input type="text" class="name-input" value="Rhia">
                <input type="number" class="weight-input" value="10" title="Weight">
            </div>
        </div>
        <button class="add-btn" onclick="addEntryRow()">+ Add Name</button>
        <button class="spin-btn" onclick="spin()">SPIN WHEEL</button>
    </div>

    <div class="main">
        <div class="pointer"></div>
        <canvas id="canvas" width="400" height="400"></canvas>
        <div id="winner-display">Ready?</div>
    </div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const colors = ["#fbbc05", "#34a853", "#4285f4", "#ea4335", "#9c27b0", "#ff5722"];
    let currentRotation = 0;

    function addEntryRow() {
        const row = document.createElement('div');
        row.className = 'entry-row';
        row.innerHTML = `<input type="text" class="name-input" placeholder="Name">
                         <input type="number" class="weight-input" value="10">`;
        document.getElementById('entry-list').appendChild(row);
        drawWheel(); // Redraw whenever entries change
    }

    function getEntries() {
        const rows = document.querySelectorAll('.entry-row');
        return Array.from(rows).map((row, i) => ({
            name: row.querySelector('.name-input').value || "Unnamed",
            weight: parseFloat(row.querySelector('.weight-input').value) || 1,
            color: colors[i % colors.length]
        }));
    }

    function drawWheel() {
        const entries = getEntries();
        const sliceAngle = (2 * Math.PI) / entries.length;
        ctx.clearRect(0,0,400,400);
        
        entries.forEach((entry, i) => {
            const angle = i * sliceAngle;
            ctx.beginPath();
            ctx.fillStyle = entry.color;
            ctx.moveTo(200, 200);
            ctx.arc(200, 200, 200, angle, angle + sliceAngle);
            ctx.fill();
            ctx.save();
            ctx.translate(200, 200);
            ctx.rotate(angle + sliceAngle / 2);
            ctx.fillStyle = "white";
            ctx.font = "bold 16px Arial";
            ctx.fillText(entry.name, 80, 5);
            ctx.restore();
        });
    }

    function spin() {
        const entries = getEntries();
        const totalWeight = entries.reduce((sum, e) => sum + e.weight, 0);
        let random = Math.random() * totalWeight;
        let winnerIndex = 0;

        for (let i = 0; i < entries.length; i++) {
            if (random < entries[i].weight) { winnerIndex = i; break; }
            random -= entries[i].weight;
        }

        const sliceAngle = 360 / entries.length;
        const targetRotation = 3600 + (360 - (winnerIndex * sliceAngle) - (sliceAngle / 2));
        currentRotation += targetRotation;
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;
        document.getElementById('winner-display').innerText = "Spinning...";

        setTimeout(() => {
            document.getElementById('winner-display').innerText = `Winner: ${entries[winnerIndex].name}!`;
        }, 4000);
    }

    drawWheel();
</script>
</body>
</html>
